<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영어 발음 학습 위젯</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d9e1ec;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #6fa0d6;
      --accent-2: #e8f1fb;
      --danger: #dc2626;
      --ok: #15803d;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%);
      color: var(--text);
      font-size: 14px;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .titlebox {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px 12px;
      flex: 1;
    }

    .titlebox h1 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.25;
    }

    .titlebox p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(88px, 1fr));
      gap: 8px;
      min-width: 380px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 22px;
      font-weight: 700;
    }

    .main {
      display: grid;
      grid-template-columns: 450px minmax(420px, 1fr);
      gap: 12px;
      align-items: start;
    }

    .right-column {
      display: grid;
      gap: 16px;
      align-content: start;
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .panel-head {
      padding: 11px 14px;
      background: linear-gradient(180deg, #f6fbff 0%, var(--accent-2) 100%);
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      font-size: 16px;
    }

    .panel-body {
      padding: 12px;
    }

    .add-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    input, select, button, textarea {
      font: inherit;
      border-radius: 20px;
      border: 1px solid var(--line);
      padding: 6px 10px;
      outline: none;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(111,160,214,0.15);
    }

    button {
      cursor: pointer;
      transition: 0.15s ease;
      background: #fff;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-soft {
      background: var(--accent-2);
      border-color: #c9dbee;
    }

    .btn-danger {
      color: var(--danger);
      border-color: #fecaca;
      background: #fff5f5;
    }

    .row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px 92px;
      gap: 6px;
      margin-bottom: 10px;
      align-items: center;
    }

    .group-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
      margin-bottom: 8px;
    }

    .group-toolbar button {
      padding: 4px 8px;
      font-size: 13px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .group-toolbar select {
      width: 90px;
      padding: 4px 6px;
      font-size: 13px;
      border-radius: 10px;
    }

    .group-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .group-tab {
      border: 1px solid var(--line);
      background: #fff;
      padding: 6px 10px;
      text-align: center;
      border-radius: 10px;
      height: 36px;
    }

    .group-tab.user-group {
      background: #d9e6cb;
      border-color: #d1e6cb;
      color: #2b2321;
    }

    .group-tab.user-group:hover {
      filter: brightness(0.98);
    }

    .group-tab.active {
      background: var(--accent-2);
      border-color: #c9dbee;
      color: var(--text);
      font-weight: 700;
    }

    .group-tab.user-group.active {
      background: #c6a8a0;
      border-color: #a9867d;
      color: #201816;
      font-weight: 700;
    }

    .inline-select {
      min-width: 140px;
    }

    .word-list {
      display: grid;
      gap: 6px;
      max-height: 620px;
      overflow: auto;
      padding-right: 2px;
    }

    .word-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      cursor: pointer;
      background: #fff;
    }

    .word-item.active {
      border-color: var(--accent);
      background: #f8fbff;
      box-shadow: inset 0 0 0 1px rgba(111,160,214,0.2);
    }

    .word-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .word-title {
      font-size: 18px;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 11px;
      background: #f3f4f6;
      color: var(--muted);
      border: 1px solid #e5e7eb;
    }

    .muted { color: var(--muted); }
    .small { font-size: 13px; }

    .detail-empty,
    .test-empty {
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .detail-word {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-word h2 {
      margin: 0 0 3px;
      font-size: 22px;
      line-height: 1.2;
    }

    .phonetic {
      font-size: 16px;
      color: var(--muted);
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      margin-top: 10px;
    }

    .section h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .meaning-list {
      margin: 0;
      padding-left: 18px;
      line-height: 1.7;
    }

    .example-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fafcff;
      padding: 10px;
      line-height: 1.55;
    }

    .test-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .question-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #fbfdff;
      margin-bottom: 12px;
    }

    .question-type {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .choices {
      display: grid;
      gap: 8px;
    }

    .choice {
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .choice.correct {
      border-color: #86efac;
      background: #f0fdf4;
      color: var(--ok);
    }

    .choice.wrong {
      border-color: #fecaca;
      background: #fef2f2;
      color: var(--danger);
    }

    .feedback {
      margin-top: 12px;
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.7;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .hidden { display: none !important; }

    .header .titlebox,
    .header .stats {
      min-height: 96px;
    }

    .group-toolbar button,
    .group-toolbar select,
    .group-tabs .group-tab,
    .toolbar input,
    .toolbar select,
    .toolbar button,
    .row button {
      height: 36px;
    }

    .detail-word {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .detail-word .row {
      gap: 6px;
      margin: 0;
    }

    .detail-word .row button {
      padding: 8px 12px;
      font-size: 14px;
      height: 42px;
    }

    .meaning-list {
      margin: 0;
      padding-left: 18px;
      line-height: 1.55;
    }

    .question-text {
      font-size: 18px;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .question-box {
      padding: 12px;
      margin-bottom: 10px;
    }

    .test-head {
      gap: 6px;
      margin-bottom: 8px;
    }

    .footer-note {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.55;
    }

    @media (max-width: 900px) {
      .header { flex-direction: column; }
      .stats { width: 100%; min-width: 0; grid-template-columns: repeat(2, 1fr); }
      .main { grid-template-columns: 1fr; }
      .group-toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar { grid-template-columns: 1fr 92px 92px; }
      .detail-word { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .test-head, .toolbar { grid-template-columns: 1fr; }
      .group-toolbar { grid-template-columns: 1fr; }
    }

    /* 👇 자체 설정창(Modal) 디자인 👇 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .modal-box {
      background: #1e1e24; padding: 20px; border-radius: 12px;
      border: 1px solid #444; width: 280px;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      color: #fff; text-align: left;
    }
    .modal-box label { font-size: 12px; color: #9aa3ad; font-weight: bold; }
    .modal-box input {
      background: #121218; color: #fff; border: 1px solid #444;
      padding: 10px; border-radius: 6px; font-size: 13px; outline: none;
    }
    .modal-box input:focus { border-color: #8fd3ff; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 5px; }
    .modal-buttons button { padding: 6px 12px; font-size: 13px; border-radius: 6px; }
    /* 👆 여기까지 👆 */
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="titlebox">
        <h1>영어 발음 학습 위젯</h1>
        <p>
          필요한 영단어를 저장하고, 클릭하면 발음, 발음기호, 뜻, 예문으로 바로 공부할 수 있습니다.
          저장한 단어들은 테스트 문제로 자동 재활용됩니다.
        </p>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">전체 단어</div><div id="statTotal" class="value">0</div></div>
        <div class="stat"><div class="label">오늘 추가</div><div id="statToday" class="value">0</div></div>
        <div class="stat"><div class="label">즐겨찾기</div><div id="statFav" class="value">0</div></div>
        <div class="stat"><div class="label">오답 누적</div><div id="statWrong" class="value">0</div></div>
      </div>
    </div>

    <div class="main">
      <section class="panel">
        <div class="panel-head">단어 추가 · 목록</div>
        <div class="panel-body">

          <div class="row" style="margin-bottom: 12px; padding: 10px; background: #e8f1fb; border-radius: 12px; justify-content: space-between; align-items: center;">
            <div>
              <div style="font-weight: bold; color: #1f2937; font-size: 13px;">☁️ 클라우드 동기화</div>
              <div id="last-sync-time" style="font-size: 11px; color: #6b7280; margin-top: 4px; font-weight: normal;">마지막 수정: 기록 없음</div>
            </div>
            <div class="row" style="margin: 0;">
              <button id="syncSettingBtn" class="btn-soft" type="button" style="background:#555; color:#fff; border:none; padding: 6px 10px; font-size: 13px;" title="동기화 설정">⚙️</button>
              <button id="syncUpBtn" class="btn-primary" type="button" style="background:#b1a995; border-color:#8a8373; color:#111; padding: 6px 10px; font-size: 13px;">구름저장☁️</button>
              <button id="syncDownBtn" class="btn-primary" type="button" style="background:#e7a86b; border-color:#b58454; color:#111; padding: 6px 10px; font-size: 13px;">불러오기☁️</button>
            </div>
          </div>
          <form id="addForm" class="add-form">
            <input id="wordInput" type="text" placeholder="예: analyze" autocomplete="off" />
            <button class="btn-primary" type="submit">단어 추가</button>
          </form>

          <div class="group-toolbar">
            <button id="createGroupBtn" class="btn-soft" type="button">탭생성</button>
            <button id="deleteGroupBtn" class="btn-danger" type="button">탭삭제</button>
            <select id="groupAssignSelect" class="inline-select">
              <option value="">그룹 지정</option>
            </select>
            <button id="assignGroupBtn" type="button">저장</button>
            <button id="removeGroupBtn" type="button">해제</button>
          </div>

          <div id="groupTabs" class="group-tabs"></div>

          <div class="toolbar">
            <input id="searchInput" type="text" placeholder="단어 검색" />
            <select id="sortSelect">
              <option value="recent">최근순</option>
              <option value="alpha">알파벳순</option>
            </select>
            <button id="favoriteFilterBtn" class="btn-soft" type="button">즐겨찾기</button>
          </div>

          <div id="wordList" class="word-list"></div>

          <div class="section">
            <div class="row">
              <button id="exportBtn" type="button">JSON 내보내기</button>
              <button id="importBtn" type="button">JSON 불러오기</button>
              <input id="importFile" class="hidden" type="file" accept="application/json" />
              <button id="clearAllBtn" class="btn-danger" type="button">전체 삭제</button>
            </div>
            <div class="footer
